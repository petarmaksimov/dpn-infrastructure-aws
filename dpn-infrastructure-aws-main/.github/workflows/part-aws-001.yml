# ==============================================================================
# GitHub Actions - Infrastructure Pipeline (part-aws-001) - OpenTofu
# ==============================================================================
# Deploys main AWS infrastructure using OpenTofu with part.tfvars
# Bootstrap must be completed first (run bootstrap-aws-001 workflow)
#
# Stages:
#   1. Validate Bootstrap Prerequisites
#   2. Code Quality (fmt, validate, tflint, tfsec)
#   3. OpenTofu Plan
#   4. OpenTofu Apply / Destroy (requires manual approval via GitHub Environment)
#   5. Post-Deployment Validation
#
# Required Secrets:
#   AWS_ACCOUNT_ID        - AWS account ID
#   AWS_ACCESS_KEY_ID     - AWS IAM access key
#   AWS_SECRET_ACCESS_KEY - AWS IAM secret key
#   AWS_REGION            - Target AWS region
#
# Required Variables (GitHub Environment or Repository Variables):
#   OPENTOFU_VERSION            - OpenTofu version (e.g. 1.9.0)
#   TFSTATE_BUCKET_NAME         - S3 bucket name for state (e.g. dpn-tfstate-part-001)
#   TFSTATE_DYNAMODB_TABLE      - DynamoDB table for locking
#   TFSTATE_KEY                 - State file key (e.g. part/terraform.tfstate)
#   PROJECT_NAME                - Project name (e.g. dpn)
#   ENVIRONMENT                 - Environment name (e.g. part)
# ==============================================================================

name: Infrastructure Deployment (part-aws-001)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan
      force_unlock:
        description: 'Force unlock state (use only if previous run was interrupted)'
        type: boolean
        default: false
  pull_request:
    branches:
      - main
      - development
    paths:
      - 'infrastructure/Tofu/**'
      - '.github/workflows/part-aws-001.yml'

permissions:
  id-token: write    # Required for OIDC
  contents: read
  pull-requests: write  # Required to post plan output as PR comment

env:
  OPENTOFU_VERSION: ${{ vars.OPENTOFU_VERSION || '1.9.0' }}
  TF_WORKING_DIR: infrastructure/Tofu
  TF_VARS_FILE: environments/part.tfvars
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ============================================================
  # Job 1: Validate Bootstrap Prerequisites
  # ============================================================
  validate-bootstrap:
    name: Validate Bootstrap Prerequisites
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate bootstrap infrastructure
        run: |
          set -e
          echo "================================================"
          echo "Validating Bootstrap Prerequisites"
          echo "================================================"

          ERRORS=0

          if aws s3 ls "s3://${{ vars.TFSTATE_BUCKET_NAME }}" 2>/dev/null; then
            echo "✅ S3 bucket exists: ${{ vars.TFSTATE_BUCKET_NAME }}"
          else
            echo "❌ S3 bucket missing: ${{ vars.TFSTATE_BUCKET_NAME }}"
            ERRORS=$((ERRORS+1))
          fi

          if aws dynamodb describe-table \
            --table-name "${{ vars.TFSTATE_DYNAMODB_TABLE }}" \
            --region "${{ secrets.AWS_REGION }}" &>/dev/null; then
            echo "✅ DynamoDB table exists: ${{ vars.TFSTATE_DYNAMODB_TABLE }}"
          else
            echo "❌ DynamoDB table missing: ${{ vars.TFSTATE_DYNAMODB_TABLE }}"
            ERRORS=$((ERRORS+1))
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "❌ Validation failed with $ERRORS error(s). Run bootstrap-aws-001 workflow first."
            exit 1
          fi
          echo "✅ All bootstrap prerequisites validated"

  # ============================================================
  # Job 2: Code Quality Checks
  # ============================================================
  quality-checks:
    name: Code Quality & Security Checks
    runs-on: ubuntu-latest
    needs: validate-bootstrap
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenTofu ${{ env.OPENTOFU_VERSION }}
        run: |
          wget -q -O tofu.zip https://github.com/opentofu/opentofu/releases/download/v${{ env.OPENTOFU_VERSION }}/tofu_${{ env.OPENTOFU_VERSION }}_linux_amd64.zip
          unzip -o tofu.zip tofu
          sudo mv tofu /usr/local/bin/
          tofu version

      - name: Install tflint and tfsec
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          curl -sSL https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash

      - name: OpenTofu Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "================================================"
          echo "Checking OpenTofu Code Formatting"
          echo "================================================"
          tofu fmt -check -recursive || {
            echo "❌ Code formatting issues detected"
            echo "Run: tofu fmt -recursive"
            exit 1
          }
          echo "✅ Code formatting check passed"

      - name: OpenTofu Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "================================================"
          echo "Validating OpenTofu Configuration"
          echo "================================================"
          tofu init -backend=false
          tofu validate
          echo "✅ Configuration validation passed"

      - name: Run tflint
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true
        run: |
          echo "================================================"
          echo "Running TFLint"
          echo "================================================"
          tflint --init
          tflint --recursive --format compact

      - name: Run tfsec
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true
        run: |
          echo "================================================"
          echo "Running TFSec Security Scan"
          echo "================================================"
          tfsec . --format json > tfsec-results.json || true
          tfsec . --format sarif > tfsec-results.sarif || true

  # ============================================================
  # Job 3: OpenTofu Plan
  # ============================================================
  plan:
    name: OpenTofu Plan
    runs-on: ubuntu-latest
    needs: quality-checks
    if: github.event_name == 'pull_request' || github.event.inputs.action == 'plan'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install OpenTofu
        run: |
          wget -q -O tofu.zip https://github.com/opentofu/opentofu/releases/download/v${{ env.OPENTOFU_VERSION }}/tofu_${{ env.OPENTOFU_VERSION }}_linux_amd64.zip
          unzip -o tofu.zip tofu
          sudo mv tofu /usr/local/bin/

      - name: Configure OpenTofu Backend
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          cat > backend-override.tf <<EOF
          terraform {
            backend "s3" {
              bucket         = "${{ vars.TFSTATE_BUCKET_NAME }}"
              key            = "${{ vars.TFSTATE_KEY }}"
              region         = "${{ secrets.AWS_REGION }}"
              dynamodb_table = "${{ vars.TFSTATE_DYNAMODB_TABLE }}"
              encrypt        = true
            }
          }
          EOF

      - name: Initialize OpenTofu
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "Initializing OpenTofu backend"
          tofu init -upgrade

      - name: Generate Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "Generating OpenTofu plan"
          tofu plan \
            -var-file="${{ env.TF_VARS_FILE }}" \
            -out=tfplan.binary

      - name: Convert Plan to JSON
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tofu show -json tfplan.binary > tfplan.json

      - name: Post Plan Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/tfplan.json', 'utf8');
            const planObj = JSON.parse(plan);
            
            const resources = planObj.resource_changes || [];
            const changes = {
              creates: resources.filter(r => r.change.actions.includes('create')).length,
              updates: resources.filter(r => r.change.actions.includes('update')).length,
              deletes: resources.filter(r => r.change.actions.includes('delete')).length
            };
            
            const comment = `## OpenTofu Plan Summary
            
            **Resource Changes:**
            - Create: ${changes.creates}
            - Update: ${changes.updates}
            - Delete: ${changes.deletes}
            
            **Plan Details:**
            \`\`\`
            Run: \`tofu plan -var-file=${{ env.TF_VARS_FILE }}\`
            \`\`\`
            
            ⚠️ **Manual Review Required** - Approve via workflow dispatch if changes look good.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ============================================================
  # Job 4: OpenTofu Apply / Destroy
  # ============================================================
  apply:
    name: OpenTofu Apply
    runs-on: ubuntu-latest
    needs: quality-checks
    if: github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy'
    environment: part-aws-001-deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install OpenTofu
        run: |
          wget -q -O tofu.zip https://github.com/opentofu/opentofu/releases/download/v${{ env.OPENTOFU_VERSION }}/tofu_${{ env.OPENTOFU_VERSION }}_linux_amd64.zip
          unzip -o tofu.zip tofu
          sudo mv tofu /usr/local/bin/

      - name: Configure OpenTofu Backend
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          cat > backend-override.tf <<EOF
          terraform {
            backend "s3" {
              bucket         = "${{ vars.TFSTATE_BUCKET_NAME }}"
              key            = "${{ vars.TFSTATE_KEY }}"
              region         = "${{ secrets.AWS_REGION }}"
              dynamodb_table = "${{ vars.TFSTATE_DYNAMODB_TABLE }}"
              encrypt        = true
            }
          }
          EOF

      - name: Initialize OpenTofu
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tofu init -upgrade

      - name: Force Unlock State
        if: ${{ github.event.inputs.force_unlock == true }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "⚠️ Force unlocking state"
          tofu force-unlock "${{ github.event.inputs.lock_id }}" -force || true

      - name: OpenTofu Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "Applying OpenTofu configuration"
          tofu apply \
            -var-file="${{ env.TF_VARS_FILE }}" \
            -auto-approve

      - name: OpenTofu Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "⚠️ Destroying infrastructure"
          tofu destroy \
            -var-file="${{ env.TF_VARS_FILE }}" \
            -auto-approve

      - name: Deployment Summary
        run: |
          echo "============================================="
          echo "Deployment Completed"
          echo "============================================="
          echo "Action: ${{ github.event.inputs.action }}"
          echo "Environment: ${{ vars.ENVIRONMENT }}"
          echo "Region: ${{ secrets.AWS_REGION }}"
          echo "============================================="

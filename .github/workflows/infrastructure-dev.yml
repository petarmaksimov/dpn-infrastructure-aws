name: Infrastructure Deployment DEV

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan
  pull_request:
    branches:
      - main
      - development
    paths:
      - "infrastructure/Tofu/**"
      - ".github/workflows/infrastructure-dev.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  OPENTOFU_VERSION: ${{ vars.OPENTOFU_VERSION || '1.9.0' }}
  TF_WORKING_DIR: infrastructure/Tofu
  TF_VARS_FILE: environments/dev.tfvars
  TF_BACKEND_CONFIG: backends/dev.hcl
  AWS_REGION: ${{ secrets.AWS_REGION || 'eu-west-2' }}

jobs:
  plan-or-apply-dev:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install OpenTofu
        run: |
          wget -q -O tofu.zip https://github.com/opentofu/opentofu/releases/download/v${{ env.OPENTOFU_VERSION }}/tofu_${{ env.OPENTOFU_VERSION }}_linux_amd64.zip
          unzip -o tofu.zip tofu
          sudo mv tofu /usr/local/bin/
          tofu version

      - name: Validate bootstrap resources
        run: |
          aws s3 ls "s3://dpn-tfstate-dev-001"
          aws dynamodb describe-table --table-name "dpn-tfstate-lock-dev" --region "${{ env.AWS_REGION }}"

      - name: OpenTofu fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tofu fmt -check -recursive

      - name: OpenTofu init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tofu init -backend-config=${{ env.TF_BACKEND_CONFIG }}

      - name: OpenTofu validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tofu validate

      - name: OpenTofu plan
        if: ${{ github.event_name == 'pull_request' || inputs.action == 'plan' || inputs.action == 'apply' }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tofu plan -var-file=${{ env.TF_VARS_FILE }} -out=tfplan

      - name: OpenTofu apply
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'apply' }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tofu apply -auto-approve tfplan

      - name: OpenTofu destroy plan
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tofu plan -destroy -var-file=${{ env.TF_VARS_FILE }} -out=tfdestroy

      - name: OpenTofu destroy
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tofu apply -auto-approve tfdestroy

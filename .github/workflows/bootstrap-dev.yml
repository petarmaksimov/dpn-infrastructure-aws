name: Bootstrap Infrastructure DEV

on:
  workflow_dispatch:
    inputs:
      what_if:
        description: "Run plan only"
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

env:
  OPENTOFU_VERSION: ${{ vars.OPENTOFU_VERSION || '1.9.0' }}
  AWS_REGION: ${{ secrets.AWS_REGION || 'eu-west-2' }}
  TF_WORKING_DIR: infrastructure/Tofu/bootstrap
  TF_VARS_FILE: environments/dev.tfvars

jobs:
  bootstrap-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install OpenTofu
        run: |
          wget -q -O tofu.zip https://github.com/opentofu/opentofu/releases/download/v${{ env.OPENTOFU_VERSION }}/tofu_${{ env.OPENTOFU_VERSION }}_linux_amd64.zip
          unzip -o tofu.zip tofu
          sudo mv tofu /usr/local/bin/
          tofu version

      - name: OpenTofu init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tofu init

      - name: OpenTofu plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tofu plan -var-file=${{ env.TF_VARS_FILE }}

      - name: OpenTofu apply
        if: ${{ inputs.what_if == false }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tofu apply -auto-approve -var-file=${{ env.TF_VARS_FILE }}
